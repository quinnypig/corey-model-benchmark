<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Quinnferno{% endblock %}</title>
  <style>
    :root{--ink:#211a16;--paper:#f3eddf;--card:#fffdf7;--night:#17100d;--red:#bd3c27;--orange:#ef7935;--gold:#edbb54;--green:#277c67;--muted:#756d63;--line:#d9cbb7;--soft:#eee4d4;--shadow:0 16px 42px #3f2a1914}
    *{box-sizing:border-box}html{background:var(--paper)}body{margin:0;background:var(--paper);color:var(--ink);font:16px/1.45 ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}a{color:var(--red)}
    .shell{width:min(1160px,calc(100% - 36px));margin:auto}header{background:var(--night);border-bottom:1px solid #ffffff12}.top{height:70px;display:flex;align-items:center;justify-content:space-between}.brand{font:800 27px/1 Georgia,serif;color:white;text-decoration:none;letter-spacing:-.5px}.brand span{color:var(--orange)}nav a{color:#e9ddcf;text-decoration:none;margin-left:24px;font-weight:700;font-size:14px}
    .hero{background:radial-gradient(circle at 75% 0,#542116 0,transparent 35%),var(--night);color:white}.hero-inner{min-height:176px;padding:30px 0 34px;display:flex;align-items:end;justify-content:space-between;gap:36px}.hero h1{font:800 clamp(38px,5vw,58px)/.98 Georgia,serif;letter-spacing:-2px;margin:5px 0 0;max-width:780px}.hero p{color:#d8cabd;font-size:17px;max-width:720px;margin:13px 0 0}.hero code{color:#f0dfd0;background:#ffffff10;border:1px solid #ffffff1e}.hero-stat{min-width:190px;border:1px solid #ffffff25;border-radius:15px;padding:16px 18px;background:#ffffff0a}.hero-stat b{display:block;font:800 30px/1 Georgia,serif}.hero-stat span{color:#d8cabd;font-size:13px}
    main{padding:28px 0 70px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:23px;margin-bottom:22px}.grid{display:grid;gap:20px}.grid.two{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}.grid.three{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}.launch-grid{display:grid;grid-template-columns:minmax(0,1.6fr) minmax(300px,.85fr);gap:22px;align-items:start}.launch-panel{position:sticky;top:18px}
    h1,h2,h3{font-family:Georgia,serif;letter-spacing:-.02em}h2{margin:0 0 15px;font-size:28px}h3{margin:0 0 10px}.eyebrow{text-transform:uppercase;letter-spacing:.14em;color:var(--orange);font-size:11px;font-weight:900}.card .eyebrow{color:var(--red)}.muted{color:var(--muted)}
    button,.button{border:0;border-radius:999px;background:var(--red);color:white;padding:11px 18px;font-weight:800;cursor:pointer;text-decoration:none;display:inline-block}button:hover,.button:hover{filter:brightness(.94)}button.secondary,.button.secondary{background:#322a25}.button.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}.button.launch{width:100%;padding:15px 20px;font-size:16px;margin-top:16px;box-shadow:0 8px 20px #bd3c2733}
    input,select,textarea{font:inherit;border:1px solid var(--line);background:white;border-radius:9px;padding:10px 11px;width:100%;color:var(--ink)}input:focus,select:focus,textarea:focus{outline:3px solid #ef793528;border-color:var(--orange)}input[type=checkbox],input[type=radio]{width:auto;accent-color:var(--red)}.field{margin-bottom:15px}.field label{display:block;font-weight:750;margin-bottom:6px}.field-help{font-size:12px;color:var(--muted);margin:5px 0 0}
    table{width:100%;border-collapse:collapse;font-size:14px}th{text-align:left;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em}th,td{padding:11px 9px;border-bottom:1px solid #e7ddcc;vertical-align:top}code{background:#eee3d1;border-radius:5px;padding:2px 5px}.status{display:inline-flex;align-items:center;gap:6px;border-radius:99px;padding:4px 9px;background:#e8dfd2;font-size:12px;font-weight:800}.status.completed{background:#d9eee7;color:#145c49}.status.running,.status.queued{background:#fff0c7;color:#795400}.status.error,.status.execution_errors,.status.completed_with_errors{background:#f7d9d1;color:#8f291b}
    .progress{height:13px;background:#e6dac8;border-radius:20px;overflow:hidden}.progress>i{display:block;height:100%;background:linear-gradient(90deg,var(--red),var(--orange),var(--gold));transition:width .4s}.metric{padding:17px;border:1px solid var(--line);border-radius:12px;background:#fff}.metric b{display:block;font:800 30px/1 Georgia,serif;margin-top:8px}.bar{height:18px;background:#eadfce;border-radius:10px;overflow:hidden}.bar i{display:block;height:100%;background:var(--red)}
    pre{white-space:pre-wrap;word-break:break-word;background:#211b17;color:#f8eee2;padding:18px;border-radius:10px;max-height:540px;overflow:auto;font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace}.flash{padding:12px 16px;background:#f7d9d1;color:#812517;border-radius:10px;margin-bottom:18px}.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}.plat{background:white;border:1px solid var(--line);border-radius:14px;overflow:hidden}.plat img{display:block;width:100%;aspect-ratio:1.15;object-fit:contain;background:#f0e8da}.plat .caption{padding:14px}.pill{font-size:11px;font-weight:850;padding:3px 7px;border-radius:99px;background:#eee1ce}.pill.good{background:#d9eee7;color:#145c49}.pill.bad{background:#f7d9d1;color:#8f291b}.pill.repaired{background:#fff0bd;color:#76520a}
    .picker-tools{display:grid;grid-template-columns:minmax(0,1fr) 210px;gap:10px;margin-bottom:10px}.models{height:472px;overflow:auto;border:1px solid var(--line);background:#fff;border-radius:11px;padding:5px}.model-option{display:flex;gap:11px;align-items:flex-start;padding:10px 9px;border-bottom:1px solid #eee5d7;cursor:pointer;border-radius:7px}.model-option:hover{background:#faf5ea}.model-option:last-child{border:0}.model-option input{margin-top:4px}.model-option span{overflow:hidden;min-width:0}.model-option strong,.model-option small{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.model-option small{color:var(--muted);font-size:12px;margin-top:2px}.model-option .added{color:#9a4b2e}.model-option .price{display:inline;color:var(--green);font-weight:800}.picker-foot{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:11px}.selected-count{font-weight:800;font-size:13px}.suite-list{list-style:none;padding:0;margin:15px 0}.suite-list li{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #e9dfd0;font-size:14px}.suite-list li:before{content:"✓";color:var(--green);font-weight:900}.suite-list li:last-child{border:0}.callout{background:#f8edcf;border:1px solid #e4cb86;border-radius:11px;padding:13px 14px;color:#5d471e;font-size:13px;margin-top:11px}.callout.cost{background:#eef6f2;border-color:#a9d0c3;color:#184f40}.estimate-number{font:800 31px/1 Georgia,serif;display:block;margin:3px 0}.cost-models{margin-top:10px;padding-top:8px;border-top:1px solid #bad9cf}.cost-row{display:flex;justify-content:space-between;gap:12px;padding:3px 0}.cost-row span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.cost-note{display:block;margin-top:7px;line-height:1.35}.advanced{border-top:1px solid var(--line);margin-top:15px;padding-top:13px}.advanced summary{cursor:pointer;font-weight:800;font-size:14px}.advanced-body{padding-top:15px}.advanced .grid{gap:10px}.advanced .field{margin-bottom:9px}details summary::marker{color:var(--red)}
    .score{font:800 24px/1 Georgia,serif}.score small{font:700 12px/1.2 ui-sans-serif,system-ui;display:block;color:var(--muted);margin-top:6px}.compare-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px}.compare{min-width:900px}.compare th{background:#f7f0e4;position:sticky;top:0;z-index:1}.compare tbody tr:hover{background:#fcf6eb}.compare tbody tr.incomplete-row{background:#faf7f1}.model-name{font-weight:850;color:var(--ink);text-decoration:none}.model-name:hover{color:var(--red)}.model-id{display:block;color:var(--muted);font:11px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace;margin-top:3px}.mini-bar{width:110px;height:7px;background:#eadfce;border-radius:8px;overflow:hidden;margin-top:7px}.mini-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--red),var(--orange))}.mini-bar.completion i{background:#76685a}.summary-strip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:1px;background:var(--line);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:22px}.summary-strip .metric{border:0;border-radius:0}.validity-banner{display:flex;justify-content:space-between;gap:20px;padding:20px 22px;margin-bottom:22px;border:1px solid #e6b8ad;border-left:5px solid var(--red);border-radius:12px;background:#fff4ef}.validity-banner h2{margin:9px 0 5px}.validity-banner p{margin:0;color:var(--muted)}.model-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}.model-meta span{border:1px solid #ffffff25;background:#ffffff0a;color:#e8d9cb;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:750}.profile-score{font-weight:850}.profile-score.pending{color:var(--muted);font-weight:600}.empty-state{text-align:center;padding:44px 22px}.run-link{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px}.card-heading{display:flex;align-items:end;justify-content:space-between;gap:20px;margin-bottom:14px}.card-heading h2{margin:0}.card-heading p{margin:0}.gallery.compact{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}.gallery.compact .plat .caption{padding:11px}.gallery.compact .plat img{aspect-ratio:1.25}
    .response-filters{display:grid;grid-template-columns:1fr 1fr auto;gap:11px;align-items:end}.response-list{display:grid;gap:16px}.response-card{background:var(--card);border:1px solid var(--line);border-radius:15px;box-shadow:var(--shadow);overflow:hidden}.response-head{display:flex;justify-content:space-between;gap:18px;padding:15px 18px;border-bottom:1px solid var(--line);background:#faf3e7}.response-head p{margin:4px 0 0}.response-body{display:grid;grid-template-columns:minmax(230px,.7fr) minmax(0,1.6fr)}.response-question{padding:18px;border-right:1px solid var(--line);background:#fffdf9}.response-answer{margin:0;border-radius:0;max-height:620px;background:#211b17}.response-meta{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}.pagination{display:flex;justify-content:center;align-items:center;gap:14px;margin-top:22px}.download-actions{display:flex;gap:8px;flex-wrap:wrap}.download-actions .button{font-size:13px;padding:8px 13px}
    .outcome-legend{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:11px;overflow:hidden;margin:0 0 14px}.outcome-legend span{background:#faf5eb;padding:11px 13px;font-size:12px;color:var(--muted)}.outcome-legend b{display:block;color:var(--ink);margin-bottom:2px}.roster-model{display:flex;align-items:flex-start;gap:10px;min-width:245px}.roster-model input{margin-top:5px}.health{display:inline-flex;border-radius:99px;padding:4px 9px;font-size:12px;font-weight:850}.health.healthy{color:#145c49;background:#d9eee7}.health-good{color:#17624e;font-weight:800}.health-bad{color:#982d1e;font-weight:800}.compare-dock{position:sticky;bottom:12px;z-index:4;display:flex;align-items:center;justify-content:flex-end;gap:11px;margin:14px 0 0 auto;padding:10px 12px;width:max-content;max-width:100%;border:1px solid var(--line);border-radius:999px;background:#fffdf7ee;box-shadow:0 12px 30px #2d1b1324;backdrop-filter:blur(12px);font-size:13px}.compare-dock[hidden]{display:none}.compare-dock button,.compare-dock .button{padding:9px 14px}.compare-dock button:disabled,button:disabled{opacity:.45;cursor:not-allowed}.compare-picker{position:relative}.compare-options{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:8px;max-height:250px;overflow:auto;padding:3px}.compare-option{display:flex;gap:9px;align-items:flex-start;border:1px solid var(--line);border-radius:10px;padding:9px 10px;background:#fff;cursor:pointer}.compare-option:has(input:checked){border-color:var(--orange);background:#fff7e8;box-shadow:0 0 0 2px #ef79351b}.compare-option input{margin-top:4px}.compare-option span{min-width:0}.compare-option strong,.compare-option small{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.compare-option small{color:var(--muted);font:11px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace}.compare-actions{display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-top:14px}.comparison-overview{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;margin-bottom:18px}.compare-model{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow)}.compare-model h2{font-size:21px;margin:5px 0 2px}.compare-model h2 a{color:var(--ink);text-decoration:none}.compare-score{font:800 38px/1 Georgia,serif;margin-top:16px}.compare-score small{font:700 14px ui-sans-serif,system-ui;color:var(--muted)}.compare-model dl{margin:14px 0 0;border-top:1px solid var(--line)}.compare-model dl div{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid #eee5d7;font-size:12px}.compare-model dt{color:var(--muted)}.compare-model dd{margin:0;font-weight:800}.section-nav{display:flex;gap:7px;overflow:auto;margin:0 0 20px;padding:4px 2px}.section-nav a{white-space:nowrap;text-decoration:none;color:var(--ink);background:#e9dfd0;border-radius:99px;padding:7px 11px;font-size:12px;font-weight:800}.comparison-section{scroll-margin-top:12px}.section-score-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:9px;margin-bottom:16px}.section-score{border:1px solid var(--line);border-radius:11px;padding:12px;background:#fff}.section-score>a{display:block;color:var(--ink);text-decoration:none;font-weight:850;line-height:1.2;min-height:34px;overflow-wrap:anywhere}.section-score>span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em}.section-score b{display:block;font:800 25px/1 Georgia,serif;margin:8px 0 4px}.section-score small{display:block;color:var(--muted);font-size:11px;min-height:16px}.matrix{min-width:1050px}.matrix th:first-child,.matrix td:first-child{width:220px;min-width:220px}.matrix th:not(:first-child){min-width:220px}.eval-label strong,.eval-label small,.eval-label a{display:block;margin-top:5px}.eval-label small{color:var(--muted);font-size:11px}.score-cell{position:relative}.score-cell>strong{font:800 25px/1 Georgia,serif}.score-cell.winner{background:#f1f8f3}.condition-scores{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}.condition-scores span{font-size:10px;background:#eee4d4;border-radius:5px;padding:3px 5px}.cell-verdict{font-size:12px;line-height:1.35;margin:9px 0;color:var(--ink)}.cell-meta{font-size:10px;color:var(--muted);margin-bottom:6px}.score-cell>a{font-size:11px}
    @media(max-width:820px){.launch-grid{grid-template-columns:1fr}.launch-panel{position:static}.hero-stat{display:none}.hero-inner{min-height:150px}.models{height:410px}.response-body{grid-template-columns:1fr}.response-question{border-right:0;border-bottom:1px solid var(--line)}.outcome-legend{grid-template-columns:1fr}.compare-dock{width:100%;border-radius:14px;justify-content:flex-start;flex-wrap:wrap}.compare-actions{justify-content:flex-start;flex-wrap:wrap}}
    @media(max-width:650px){.top nav{display:none}.hero-inner{padding:25px 0 29px}.hero h1{letter-spacing:-1.5px}.hero p{font-size:15px}.card{padding:17px}.shell{width:min(100% - 22px,1160px)}table{display:block;overflow-x:auto}.picker-tools,.response-filters{grid-template-columns:1fr}.models{height:380px}.picker-foot{align-items:flex-start;flex-direction:column}.summary-strip{grid-template-columns:1fr 1fr}.card-heading,.response-head{align-items:flex-start;flex-direction:column}.response-meta{justify-content:flex-start}.comparison-overview{grid-template-columns:1fr}.section-score-grid{grid-template-columns:1fr 1fr}}
  </style>
  {% block head %}{% endblock %}
</head>
<body id="top">
  <header><div class="shell top"><a class="brand" href="/">Quinn<span>ferno</span></a><nav><a href="/">Runs</a><a href="/models">Model cards</a><a href="/models/compare">Compare</a><a href="/responses">Responses</a><a href="/platypuses">Platypuses</a></nav></div></header>
  {% block hero %}{% endblock %}
  <main class="shell">
    {% with messages = get_flashed_messages(with_categories=true) %}{% for category,message in messages %}<div class="flash">{{ message }}</div>{% endfor %}{% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
